name: Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/scripts/**"
      - ".github/workflows/windows-build.yml"
      - "creavision/**"
      - "simplelog/**"
      - "src/**"
      - "win32/**"
      - "wxcamwindow/**"
      - "wxutil/**"

jobs:
  windows-x64:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Download official Windows dependencies
        shell: pwsh
        run: .github\scripts\setup-windows-deps.ps1

      - name: Build eViacam
        id: build
        shell: pwsh
        continue-on-error: true
        run: |
          & msbuild `
            'win32\eviacam.sln' `
            '/m' `
            '/p:Configuration=Release' `
            '/p:Platform=x64' `
            '/p:PlatformToolset=v143' `
            '/fl' `
            '/flp:logfile=msbuild.log;verbosity=normal'

      - name: Summarize build log
        if: always()
        shell: pwsh
        run: |
          $summaryPath = $env:GITHUB_STEP_SUMMARY
          if (-not (Test-Path msbuild.log)) {
            'msbuild.log not found.' | Tee-Object -FilePath $summaryPath -Append
            exit 0
          }

          $errors = Select-String -Path msbuild.log -Pattern ': error ',': fatal error ' | Select-Object -First 80
          $warnings = Select-String -Path msbuild.log -Pattern ': warning ' | Select-Object -First 40

          if ($errors) {
            '## MSBuild errors' | Tee-Object -FilePath $summaryPath -Append
            '```text' | Tee-Object -FilePath $summaryPath -Append
            $errors | ForEach-Object { $_.Line } | Tee-Object -FilePath $summaryPath -Append
            '```' | Tee-Object -FilePath $summaryPath -Append
          }
          else {
            'No error lines matched in msbuild.log.' | Tee-Object -FilePath $summaryPath -Append
          }

          if ($warnings) {
            '## MSBuild warnings (first 40)' | Tee-Object -FilePath $summaryPath -Append
            '```text' | Tee-Object -FilePath $summaryPath -Append
            $warnings | ForEach-Object { $_.Line } | Tee-Object -FilePath $summaryPath -Append
            '```' | Tee-Object -FilePath $summaryPath -Append
          }

      - name: Package build output
        if: steps.build.outcome == 'success'
        shell: pwsh
        run: .github\scripts\package-windows-build.ps1

      - name: Upload artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: eviacam-windows-x64
          path: ${{ env.ARTIFACT_ZIP }}

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eviacam-msbuild-log
          path: msbuild.log
          if-no-files-found: ignore

      - name: Fail if build failed
        if: steps.build.outcome != 'success'
        shell: pwsh
        run: exit 1
